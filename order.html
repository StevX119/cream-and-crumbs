<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream & Crumbs | Elite Order System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #2c1e12; --gold: #c5a059; --cream: #fdf5e6; }
        * { box-sizing: border-box; transition: 0.5s ease; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: fixed linear-gradient(45deg, #1a0f07, #2c1e12); 
            color: white; min-height: 100vh; padding: 50px 20px;
        }
        
        .order-container { 
            max-width: 700px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(197, 160, 89, 0.2); 
            padding: 60px; border-radius: 50px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); 
        }

        h1 { 
            font-family: 'Playfair Display', serif; text-align: center; 
            color: var(--gold); letter-spacing: 5px; font-size: 3rem; margin-bottom: 10px; 
        }
        .slogan { text-align: center; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 50px; opacity: 0.6; }

        .form-section { margin-bottom: 35px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 10px; }
        
        input, select, textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(197, 160, 89, 0.3); 
            padding: 15px; border-radius: 15px; color: white; font-family: 'Poppins'; outline: none;
        }
        input:focus, select:focus { border-color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .submit-btn { 
            width: 100%; padding: 20px; background: var(--gold); color: var(--coffee); 
            border: none; border-radius: 50px; font-weight: 600; cursor: pointer; 
            font-size: 1.1rem; letter-spacing: 2px; margin-top: 30px;
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.3);
        }
        .submit-btn:hover { background: white; transform: scale(1.03); }
    </style>
</head>
<body>

    <div class="order-container">
        <h1>ORDER NOW</h1>
        <p class="slogan">"Where Sweet Treats Meet Great Coffee."</p>

        <form id="orderForm">
            <!-- Customer Identity -->
            <div class="form-section">
                <label>Customer Name</label>
                <input type="text" id="custName" placeholder="Enter your full name" required>
            </div>

            <!-- Coffee Selection (10 Options) -->
            <div class="form-section">
                <label>Coffee Selection</label>
                <select id="coffeeOrder">
                    <option value="None">- No Coffee Selected -</option>
                    <option>Espresso Shot</option>
                    <option>Classic Americano</option>
                    <option>Caffe Latte</option>
                    <option>Creamy Cappuccino</option>
                    <option>Caramel Macchiato</option>
                    <option>Mocha Delight</option>
                    <option>Vanilla Bean Latte</option>
                    <option>Hazelnut Infusion</option>
                    <option>Signature Cold Brew</option>
                    <option>Irish Cream Coffee</option>
                </select>
            </div>

            <!-- Cake & Treats Selection (10 Options) -->
            <div class="form-section">
                <label>Sweet Treats & Cakes</label>
                <select id="cakeOrder">
                    <option value="None">- No Cake Selected -</option>
                    <option>Signature Chocolate Cake</option>
                    <option>New York Cheesecake</option>
                    <option>Red Velvet Fantasy</option>
                    <option>Classic Tiramisu</option>
                    <option>Strawberry Shortcake</option>
                    <option>Blueberry Glazed Muffin</option>
                    <option>Almond Butter Croissant</option>
                    <option>Rainbow Mille Crepe</option>
                    <option>Zesty Carrot Cake</option>
                    <option>Molten Lava Cake</option>
                </select>
            </div>

            <!-- Shakes Selection (10 Options) -->
            <div class="form-section">
                <label>Creamy Shakes</label>
                <select id="shakeOrder">
                    <option value="None">- No Shake Selected -</option>
                    <option>Pure Vanilla Shake</option>
                    <option>Double Chocolate Blast</option>
                    <option>Strawberry Dream</option>
                    <option>Oreo Overload Shake</option>
                    <option>Avocado Supreme</option>
                    <option>Matcha Zen Shake</option>
                    <option>Salted Caramel Dream</option>
                    <option>Banana Berry Fusion</option>
                    <option>Tropical Mango Tango</option>
                    <option>Mint Choco Heaven</option>
                </select>
            </div>

            <div class="form-section">
                <label>Delivery Address & Notes</label>
                <textarea id="custAddress" rows="3" placeholder="Enter your address and special requests..."></textarea>
            </div>

            <button type="submit" class="submit-btn">SEND TO KITCHEN</button>
        </form>
        <p style="text-align: center; margin-top: 30px; font-size: 0.7rem; opacity: 0.4;">&copy; 2026 CREAM & CRUMBS CAFÉ</p>
    </div>

    <!-- Firebase Integration -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD2IZrX7xpG9hU_8Rfx2th9-Gbbb7zTQ9k",
          authDomain: "cream-and-crumbs.firebaseapp.com",
          databaseURL: "https://cream-and-crumbs-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "cream-and-crumbs",
          storageBucket: "cream-and-crumbs.firebasestorage.app",
          messagingSenderId: "276859335812",
          appId: "1:276859335812:web:b52580fed0c6dfce18fed1"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const orderData = {
                customer: document.getElementById('custName').value,
                coffee: document.getElementById('coffeeOrder').value,
                cake: document.getElementById('cakeOrder').value,
                shake: document.getElementById('shakeOrder').value,
                address: document.getElementById('custAddress').value,
                timestamp: new Date().toLocaleString()
            };

            database.ref('orders').push().set(orderData)
            .then(() => { 
                alert("Order Embarked! Our baristas are on it. ✅"); 
                window.location.href = "index.html"; 
            });
        });
    </script>
</body>
</html>
