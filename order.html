<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order | Cream & Crumbs</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #4b3621; --cream: #fdf5e6; --accent: #d2691e; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--coffee); }
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 600px; margin: 60px auto; padding: 40px; background: white; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; font-size: 1.1rem; }
        .btn:hover { background: var(--coffee); }
    </style>
</head>
<body>
    <nav>
        <img src="logo.png" alt="Logo" style="height: 60px;">
        <div style="font-weight: 600;">
            <a href="index.html" style="text-decoration:none; color:var(--coffee); margin-left:20px;">Home</a>
            <a href="services.html" style="text-decoration:none; color:var(--coffee); margin-left:20px;">Services</a>
        </div>
    </nav>

    <div class="container">
        <h1>Place Your Order</h1>
        <form>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Select Menu</label>
                <select>
                    <option>Coffee Selection</option>
                    <option>Creamy Shakes</option>
                    <option>Sweet Treats</option>
                </select>
            </div>
            <div class="form-group">
                <label>Delivery Address</label>
                <textarea rows="3" placeholder="Enter address"></textarea>
            </div>
            <button type="button" class="btn">Send Order to WhatsApp</button>
        </form>
    </div>
</body>
</html>
