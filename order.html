<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream & Crumbs | Elite Visual Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --coffee: #1a0f07; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle, #2c1e12 0%, #1a0f07 100%); 
            color: #fdf5e6; padding-bottom: 100px;
        }

        /* Navigasi Modern */
        nav { 
            background: rgba(0,0,0,0.85); padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; position: sticky; 
            top: 0; z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid var(--gold); 
        }
        nav img { height: 45px; filter: drop-shadow(0 0 5px var(--gold)); }
        .nav-links a { text-decoration: none; color: white; margin-left: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        h1 { font-family: 'Playfair Display', serif; text-align: center; font-size: 3.5rem; color: var(--gold); margin: 0; }
        .slogan { text-align: center; letter-spacing: 3px; opacity: 0.7; margin-bottom: 50px; font-style: italic; }

        /* Kategori Title */
        .category-title { 
            font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); 
            border-left: 6px solid var(--gold); padding-left: 20px; margin: 60px 0 30px; 
        }
        
        /* Grid Menu Visual */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }
        
        .menu-item { 
            background: var(--glass); border: 1px solid rgba(197, 160, 89, 0.2); 
            border-radius: 25px; padding: 20px; text-align: center; cursor: pointer; position: relative;
        }
        .menu-item img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .menu-item h4 { margin: 10px 0; font-size: 1rem; color: #fff; }
        .menu-item:hover { transform: translateY(-12px); border-color: var(--gold); background: rgba(197, 160, 89, 0.1); }
        
        /* Fix Visibilitas Saat Dipilih */
        .menu-item.selected { 
            background: var(--gold) !important; 
            box-shadow: 0 0 30px var(--gold);
        }
        .menu-item.selected h4 { color: var(--coffee) !important; font-weight: 700; }
        .menu-item.selected::after { 
            content: '✓'; position: absolute; top: 15px; right: 15px; 
            background: var(--coffee); color: var(--gold); width: 30px; height: 30px; 
            border-radius: 50%; line-height: 30px; font-weight: bold; 
        }

        /* Box Formulir Akhir */
        .order-form-box { 
            background: rgba(0,0,0,0.4); padding: 50px; border-radius: 40px; 
            margin-top: 80px; border: 1px solid rgba(197, 160, 89, 0.3); backdrop-filter: blur(10px);
        }
        
        /* FIX: Input text visibility issues */
        input, textarea { 
            width: 100%; background: rgba(0, 0, 0, 0.6) !important; 
            border: 1px solid var(--gold); padding: 18px; border-radius: 15px; 
            color: #ffffff !important; font-family: 'Poppins'; margin-bottom: 25px; 
            outline: none; font-size: 1rem;
        }
        input:focus { border-color: #fff; box-shadow: 0 0 15px var(--gold); }
        ::placeholder { color: rgba(255,255,255,0.4); }

        .summary-box { 
            background: rgba(197, 160, 89, 0.1); padding: 25px; border-radius: 15px; 
            margin-bottom: 30px; border-left: 5px solid var(--gold); 
        }
        #summaryText { color: var(--gold); font-weight: 600; line-height: 1.6; }

        .submit-btn { 
            width: 100%; padding: 22px; background: var(--gold); color: var(--coffee); 
            border: none; border-radius: 50px; font-weight: 700; cursor: pointer; 
            font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase;
        }
        .submit-btn:hover { background: #fff; transform: scale(1.02); box-shadow: 0 0 30px #fff; }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="Cream & Crumbs Logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="service.html">Services</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="container">
        <h1>ORDER MENU</h1>
        <p class="slogan">"Where Sweet Treats Meet Great Coffee."</p>

        <!-- KATEGORI 1: COFFEE (10 Menu) -->
        <h2 class="category-title">Elite Coffee Selection</h2>
        <div class="menu-grid" id="coffeeGrid">
            <div class="menu-item" onclick="selectItem(this, 'coffee', 'Caramel Iced Coffee')">
                <img src="Homemade Caramel Iced Coffee.jpeg">
                <h4>Caramel Iced Coffee</h4>
            </div>
            <script>
                const coffees = ["Espresso Shot", "Classic Americano", "Caffe Latte", "Cappuccino Luxe", "Vanilla Macchiato", "Mocha Delight", "Hazelnut Brew", "Cold Brew Soul", "Irish Cream Coffee"];
                coffees.forEach(name => {
                    document.write(`
                        <div class="menu-item" onclick="selectItem(this, 'coffee', '${name}')">
                            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=300&q=80">
                            <h4>${name}</h4>
                        </div>
                    `);
                });
            </script>
        </div>

        <!-- KATEGORI 2: CAKES & TREATS (10 Menu) -->
        <h2 class="category-title">Signature Cakes & Treats</h2>
        <div class="menu-grid" id="treatsGrid">
            <div class="menu-item" onclick="selectItem(this, 'treats', 'Signature Chocolate Cake')">
                <img src="13792342604774392.jpeg">
                <h4>Signature Cake</h4>
            </div>
            <script>
                const treats = ["New York Cheesecake", "Red Velvet Fantasy", "Classic Tiramisu", "Strawberry Shortcake", "Blueberry Muffin", "Almond Croissant", "Rainbow Mille Crepe", "Zesty Carrot Cake", "Molten Lava Cake"];
                treats.forEach(name => {
                    document.write(`
                        <div class="menu-item" onclick="selectItem(this, 'treats', '${name}')">
                            <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=300&q=80">
                            <h4>${name}</h4>
                        </div>
                    `);
                });
            </script>
        </div>

        <!-- KATEGORI 3: SHAKES (10 Menu) -->
        <h2 class="category-title">Pure Creamy Shakes</h2>
        <div class="menu-grid" id="shakesGrid">
            <div class="menu-item" onclick="selectItem(this, 'shakes', 'Afternoon Delight Shake')">
                <img src="afiyet olsun 😋😋.jpeg">
                <h4>Afternoon Delight</h4>
            </div>
            <script>
                const shakes = ["Pure Vanilla Shake", "Double Chocolate Blast", "Strawberry Dream", "Oreo Overload", "Avocado Supreme", "Matcha Zen", "Salted Caramel", "Banana Fusion", "Tropical Mango"];
                shakes.forEach(name => {
                    document.write(`
                        <div class="menu-item" onclick="selectItem(this, 'shakes', '${name}')">
                            <img src="https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=300&q=80">
                            <h4>${name}</h4>
                        </div>
                    `);
                });
            </script>
        </div>

        <!-- KONFIRMASI PESANAN -->
        <div class="order-form-box">
            <h2 style="color:var(--gold); text-align:center; margin-bottom:30px;">Finalize Your Order</h2>
            <form id="finalOrderForm">
                <input type="text" id="custName" placeholder="Your Full Name" required>
                <textarea id="custAddress" placeholder="Full Delivery Address" rows="3" required></textarea>
                
                <div class="summary-box">
                    <p style="margin-bottom: 10px;"><strong>Your Current Selection:</strong></p>
                    <p id="summaryText">Please click on the items above to select your order.</p>
                </div>

                <button type="submit" class="submit-btn">CONFIRM & SEND TO SYSTEM</button>
            </form>
        </div>
    </div>

    <!-- Firebase Integration -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // Konfigurasi Firebase dari akun Anda
        const firebaseConfig = {
          apiKey: "AIzaSyD2IZrX7xpG9hU_8Rfx2th9-Gbbb7zTQ9k",
          authDomain: "cream-and-crumbs.firebaseapp.com",
          databaseURL: "https://cream-and-crumbs-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "cream-and-crumbs",
          storageBucket: "cream-and-crumbs.firebasestorage.app",
          messagingSenderId: "276859335812",
          appId: "1:276859335812:web:b52580fed0c6dfce18fed1"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let selections = { coffee: "", treats: "", shakes: "" };

        function selectItem(element, category, name) {
            // Reset pilihan di kategori yang sama
            const siblings = element.parentElement.querySelectorAll('.menu-item');
            siblings.forEach(el => el.classList.remove('selected'));
            
            // Tandai item yang diklik
            element.classList.add('selected');
            selections[category] = name;
            
            // Perbarui teks ringkasan
            document.getElementById('summaryText').innerHTML = 
                `☕ Coffee: ${selections.coffee || '-'} <br> 
                 🍰 Treats: ${selections.treats || '-'} <br> 
                 🥤 Shake: ${selections.shakes || '-'}`;
        }

        document.getElementById('finalOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(!selections.coffee && !selections.treats && !selections.shakes) {
                alert("Please select at least one delicious item first!");
                return;
            }

            database.ref('orders').push().set({
                customer: document.getElementById('custName').value,
                address: document.getElementById('custAddress').value,
                items: selections,
                order_date: new Date().toLocaleString()
            }).then(() => {
                alert("Order Saved! Your sweet treats are coming soon. ✅");
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
