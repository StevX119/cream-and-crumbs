<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Now | Cream & Crumbs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #4b3621; --cream: #fdf5e6; --accent: #d2691e; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--coffee); }
        .container { max-width: 600px; margin: 60px auto; padding: 40px; background: white; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center">Place Your Order</h2>
        <form id="orderForm">
            <div class="form-group"><label>Name</label><input type="text" id="name" required></div>
            <div class="form-group"><label>Menu Choice</label>
                <select id="menu">
                    <option>Iced Coffee</option>
                    <option>Creamy Shake</option>
                    <option>Sweet Treats</option>
                </select>
            </div>
            <div class="form-group"><label>Address</label><textarea id="address" rows="3"></textarea></div>
            <button type="button" class="btn" onclick="sendWA()">Send via WhatsApp</button>
        </form>
    </div>
    <script>
        function sendWA() {
            const name = document.getElementById('name').value;
            const menu = document.getElementById('menu').value;
            const address = document.getElementById('address').value;
            const phone = "6285881194549"; // GANTI DENGAN NOMOR WA ANDA
            const msg = `Halo Cream %26 Crumbs Café,%0ANama: ${name}%0APesanan: ${menu}%0AAlamat: ${address}`;
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
