<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream & Crumbs | Ultimate Multi-Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --coffee: #1a0f07; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle, #2c1e12 0%, #1a0f07 100%); 
            color: #fdf5e6; padding-bottom: 100px;
        }

        nav { 
            background: rgba(0,0,0,0.9); padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; position: sticky; 
            top: 0; z-index: 1000; backdrop-filter: blur(15px); border-bottom: 1px solid var(--gold); 
        }
        nav img { height: 45px; }
        .nav-links a { text-decoration: none; color: white; margin-left: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        h1 { font-family: 'Playfair Display', serif; text-align: center; font-size: 4rem; color: var(--gold); margin: 0; }
        .slogan { text-align: center; letter-spacing: 3px; opacity: 0.7; margin-bottom: 50px; font-style: italic; }

        .category-title { 
            font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); 
            border-left: 6px solid var(--gold); padding-left: 20px; margin: 80px 0 30px; 
        }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }
        
        .menu-item { 
            background: var(--glass); border: 1px solid rgba(197, 160, 89, 0.2); 
            border-radius: 25px; padding: 15px; text-align: center; cursor: pointer; position: relative;
        }
        .menu-item img { width: 100%; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }
        .menu-item h4 { margin: 10px 0; font-size: 1rem; color: #fff; }
        
        /* State Saat Dipilih (Bisa lebih dari 2) */
        .menu-item.selected { background: var(--gold) !important; transform: scale(1.05); box-shadow: 0 0 40px var(--gold); }
        .menu-item.selected h4 { color: var(--coffee) !important; font-weight: 700; }
        .menu-item.selected::after { 
            content: 'SELECTED'; position: absolute; top: 10px; right: 10px; 
            background: var(--coffee); color: var(--gold); padding: 5px 10px;
            border-radius: 10px; font-size: 0.6rem; font-weight: bold;
        }

        .order-form-box { 
            background: rgba(0,0,0,0.4); padding: 50px; border-radius: 40px; 
            margin-top: 100px; border: 1px solid rgba(197, 160, 89, 0.3); backdrop-filter: blur(10px);
        }
        input, textarea { 
            width: 100%; background: rgba(0, 0, 0, 0.6) !important; 
            border: 1px solid var(--gold); padding: 20px; border-radius: 15px; 
            color: #ffffff !important; font-family: 'Poppins'; margin-bottom: 25px; outline: none;
        }
        .summary-box { 
            background: rgba(197, 160, 89, 0.1); padding: 25px; border-radius: 15px; 
            margin-bottom: 30px; border-left: 5px solid var(--gold); color: var(--gold);
        }

        .submit-btn { 
            width: 100%; padding: 25px; background: var(--gold); color: var(--coffee); 
            border: none; border-radius: 50px; font-weight: 700; cursor: pointer; 
            font-size: 1.5rem; letter-spacing: 3px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="Logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="service.html">Services</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="container">
        <h1>PREMIUM ORDER</h1>
        <p class="slogan">"Where Sweet Treats Meet Great Coffee." [2]</p>

        <!-- KATEGORI COFFEE -->
        <h2 class="category-title">Coffee Selection</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="toggleSelection(this, 'Caramel Iced Coffee')">
                <img src="Homemade Caramel Iced Coffee.jpeg"> <!-- Dari Sumber [2] -->
                <h4>Caramel Iced Coffee</h4>
            </div>
            <div class="menu-item" onclick="toggleSelection(this, 'Midnight Espresso')">
                <img src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=400">
                <h4>Midnight Espresso</h4>
            </div>
            <!-- Ulangi sampai 10 menu dengan gambar unik -->
            <script>
                const extraCoffees = ["Classic Americano", "Velvet Latte", "Cappuccino Gold", "Vanilla Macchiato", "Mocha Indulgence", "Hazelnut Brew", "Cold Brew Soul", "Irish Cream"];
                extraCoffees.forEach((name, i) => {
                    document.write(`<div class="menu-item" onclick="toggleSelection(this, '${name}')">
                        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&sig=${i}">
                        <h4>${name}</h4></div>`);
                });
            </script>
        </div>

        <!-- KATEGORI CAKES -->
        <h2 class="category-title">Signature Cakes</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="toggleSelection(this, 'Signature Chocolate Cake')">
                <img src="13792342604774392.jpeg"> <!-- Dari Sumber [2] -->
                <h4>Signature Cake</h4>
            </div>
            <script>
                const cakes = ["NY Cheesecake", "Red Velvet", "Classic Tiramisu", "Berry Shortcake", "Blueberry Muffin", "Almond Croissant", "Rainbow Crepe", "Carrot Cake", "Lava Cake"];
                cakes.forEach((name, i) => {
                    document.write(`<div class="menu-item" onclick="toggleSelection(this, '${name}')">
                        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&sig=${i+10}">
                        <h4>${name}</h4></div>`);
                });
            </script>
        </div>

        <!-- KATEGORI SHAKES -->
        <h2 class="category-title">Creamy Shakes</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="toggleSelection(this, 'Afternoon Delight Shake')">
                <img src="afiyet olsun 😋😋.jpeg"> <!-- Dari Sumber [2] -->
                <h4>Afternoon Delight</h4>
            </div>
            <script>
                const shakes = ["Vanilla Cloud", "Choco Blast", "Strawberry Dream", "Oreo Overload", "Avocado Supreme", "Matcha Zen", "Salted Caramel", "Banana Fusion", "Tropical Mango"];
                shakes.forEach((name, i) => {
                    document.write(`<div class="menu-item" onclick="toggleSelection(this, '${name}')">
                        <img src="https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=400&sig=${i+20}">
                        <h4>${name}</h4></div>`);
                });
            </script>
        </div>

        <div class="order-form-box">
            <form id="multiOrderForm">
                <input type="text" id="custName" placeholder="Your Name" required>
                <textarea id="custAddress" placeholder="Delivery Address" rows="3" required></textarea>
                <div class="summary-box">
                    <strong>Selected Items:</strong>
                    <div id="selectedList">None (Click images to add)</div>
                </div>
                <button type="submit" class="submit-btn">PLACE MULTI-ORDER</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD2IZrX7xpG9hU_8Rfx2th9-Gbbb7zTQ9k",
          authDomain: "cream-and-crumbs.firebaseapp.com",
          databaseURL: "https://cream-and-crumbs-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "cream-and-crumbs",
          storageBucket: "cream-and-crumbs.firebasestorage.app",
          messagingSenderId: "276859335812",
          appId: "1:276859335812:web:b52580fed0c6dfce18fed1"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let myOrders = [];

        function toggleSelection(element, itemName) {
            element.classList.toggle('selected');
            if (element.classList.contains('selected')) {
                myOrders.push(itemName);
            } else {
                myOrders = myOrders.filter(item => item !== itemName);
            }
            document.getElementById('selectedList').innerText = myOrders.length > 0 ? myOrders.join(", ") : "None";
        }

        document.getElementById('multiOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(myOrders.length === 0) { alert("Please select at least one item!"); return; }
            
            database.ref('orders').push().set({
                customer: document.getElementById('custName').value,
                address: document.getElementById('custAddress').value,
                items: myOrders,
                total_items: myOrders.length,
                timestamp: new Date().toLocaleString()
            }).then(() => {
                alert("Order for " + myOrders.length + " items received! ✅");
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
