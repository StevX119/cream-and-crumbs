<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream & Crumbs | Order Excellence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #2c1e12; --gold: #c5a059; --cream: #fdf5e6; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: fixed linear-gradient(45deg, #1a0f07, #2c1e12); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .order-container { width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px; border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--gold); letter-spacing: 3px; font-weight: 300; margin-bottom: 40px; }
        
        .input-group { margin-bottom: 25px; position: relative; }
        input, select, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--gold); padding: 10px 0; color: white; font-family: 'Poppins'; font-size: 1rem; outline: none; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); }
        
        .submit-btn { width: 100%; padding: 15px; background: var(--gold); color: var(--coffee); border: none; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3); }
        .submit-btn:hover { background: white; transform: scale(1.05); }

        .back-home { display: block; text-align: center; margin-top: 20px; color: white; text-decoration: none; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="order-container">
        <h1>PLACE ORDER</h1>
        <form id="orderForm">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="custName" required>
            </div>
            <div class="input-group">
                <label>Product</label>
                <select id="custMenu">
                    <option>Signature Cake</option>
                    <option>Creamy Shakes</option>
                    <option>Caramel Iced Coffee</option>
                </select>
            </div>
            <div class="input-group">
                <label>Note to Barista</label>
                <textarea id="custNote" rows="2"></textarea>
            </div>
            <button type="submit" class="submit-btn">SEND TO SYSTEM</button>
        </form>
        <a href="index.html" class="back-home">← Back to Sanctuary</a>
    </div>

    <!-- Firebase SDK (Koneksi ke Database Kamu) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD2IZrX7xpG9hU_8Rfx2th9-Gbbb7zTQ9k",
          authDomain: "cream-and-crumbs.firebaseapp.com",
          databaseURL: "https://cream-and-crumbs-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "cream-and-crumbs",
          storageBucket: "cream-and-crumbs.firebasestorage.app",
          messagingSenderId: "276859335812",
          appId: "1:276859335812:web:b52580fed0c6dfce18fed1"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            database.ref('orders').push().set({
                name: document.getElementById('custName').value,
                item: document.getElementById('custMenu').value,
                note: document.getElementById('custNote').value,
                date: new Date().toLocaleString()
            }).then(() => { 
                alert("Order Embarked! See you soon. ✅"); 
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
