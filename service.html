<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream & Crumbs Café | Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #4b3621; --cream: #fdf5e6; --accent: #d2691e; }
        
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--coffee); overflow-x: hidden; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { animation: fadeInUp 1.2s ease-out; }

        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        nav img { height: 60px; }
        .nav-links a { text-decoration: none; color: var(--coffee); margin-left: 30px; font-weight: 600; position: relative; }
        .nav-links a::after { content: ''; width: 0; height: 2px; background: var(--accent); position: absolute; bottom: -5px; left: 0; transition: 0.3s; }
        .nav-links a:hover::after { width: 100%; }

        .container { max-width: 900px; margin: 80px auto; padding: 0 20px; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 20px; }
        .divider { width: 80px; height: 4px; background: var(--accent); margin: 0 auto 40px; }

        .service-card { 
            background: white; 
            padding: 50px; 
            border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05); 
        }
        
        .service-card img { 
            width: 100%; 
            max-width: 600px; 
            border-radius: 20px; 
            margin: 30px 0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .order-btn { 
            display: inline-block; 
            background: var(--coffee); 
            color: white; 
            padding: 20px 60px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 600; 
            margin-top: 20px; 
            box-shadow: 0 10px 20px rgba(75, 54, 33, 0.2);
        }
        
        .order-btn:hover { 
            background: var(--accent); 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(210, 105, 30, 0.3);
        }

        footer { background: var(--coffee); color: white; padding: 40px; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="Cream & Crumbs Logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="service.html">Service</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="container reveal">
        <h1 class="section-title">SERVICE</h1>
        <div class="divider"></div>
        
        <div class="service-card">
            <p style="font-size: 1.2rem; opacity: 0.8;">Enjoy our high-quality selections delivered right to your doorstep.</p>
            <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-top: 40px;">Order Now!</h2>
            <img src="price.png" alt="Menu Price List">
            <br>
            <a href="#" class="order-btn">Place Your Order</a>
        </div>
    </div>

    <footer>&copy; 2026 Cream & Crumbs Café. Professional Taste, Quality Service.</footer>

</body>
</html>
