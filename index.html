<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream & Crumbs Café | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #4b3621; --cream: #fdf5e6; --accent: #d2691e; }
        * { box-sizing: border-box; transition: all 0.4s ease; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--coffee); }
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        nav img { height: 60px; }
        .nav-links a { text-decoration: none; color: var(--coffee); margin-left: 30px; font-weight: 600; }
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        footer { background: var(--coffee); color: white; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <img src="logo.png" alt="Logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="service.html">Services</a>
            <a href="about.html">About</a>
            <a href="order.html">Order Now</a>
        </div>
    </nav>
    <div class="hero">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0;">WELCOME</h1>
        <p style="font-size: 1.5rem; font-style: italic;">"Where Sweet Treats Meet Great Coffee."</p>
    </div>
    <div class="container">
        <p style="font-size: 1.1rem; line-height: 1.8;">Welcome to Cream & Crumbs, your online destination for delicious coffee, creamy shakes, and irresistible sweet treats [2].</p>
        <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-top: 50px;">Our Best Seller</h2>
        <div class="grid">
            <div class="card"><img src="action.jpeg"><h3>Signature Cake</h3></div>
            <div class="card"><img src="afiyet olsun 😋😋.jpeg"><h3>Afternoon Delight</h3></div>
            <div class="card"><img src="Homemade Caramel Iced Coffee.jpeg"><h3>Iced Coffee</h3></div>
        </div>
    </div>
    <footer>&copy; 2026 Cream & Crumbs Café.</footer>
</body>
</html>
