<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream & Crumbs Café | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS ANIMASI & STYLE UTAMA */
        :root { --coffee: #4b3621; --cream: #fdf5e6; --accent: #d2691e; }
        
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--coffee); overflow-x: hidden; }

        /* Smooth Fade-In Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { animation: fadeInUp 1.2s ease-out; }

        /* Navigasi Transparan ke Solid */
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        nav img { height: 60px; }
        .nav-links a { text-decoration: none; color: var(--coffee); margin-left: 30px; font-weight: 600; position: relative; }
        .nav-links a::after { content: ''; width: 0; height: 2px; background: var(--accent); position: absolute; bottom: -5px; left: 0; transition: 0.3s; }
        .nav-links a:hover::after { width: 100%; }

        /* Hero Section Premium */
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 5rem; margin: 0; letter-spacing: 5px; }
        .hero p { font-size: 1.5rem; font-style: italic; opacity: 0.9; }

        /* Container & Cards */
        .container { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 50px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; }
        .card:hover { transform: scale(1.03); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 25px; text-align: center; }

        footer { background: var(--coffee); color: white; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="Cream & Crumbs Logo">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="service.html">Service</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="hero">
        <h1 class="reveal">WELCOME</h1>
        <p class="reveal" style="animation-delay: 0.3s;">Where Sweet Treats Meet Great Coffee</p>
    </div>

    <div class="container reveal">
        <h2 class="section-title">Our Best Sellers</h2>
        <div class="grid">
            <div class="card">
                <img src="action.jpeg" alt="Cake">
                <div class="card-info"><h3>Signature Cake</h3></div>
            </div>
            <div class="card">
                <img src="afiyet olsun 😋😋.jpeg" alt="Delight">
                <div class="card-info"><h3>Afternoon Delight</h3></div>
            </div>
            <div class="card">
                <img src="Homemade Caramel Iced Coffee.jpeg" alt="Coffee">
                <div class="card-info"><h3>Caramel Iced Coffee</h3></div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Cream & Crumbs Café. Professional Taste, Quality Service.</footer>

</body>
</html>
